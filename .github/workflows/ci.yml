name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend (lint · types · tests · eval)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.8"
          enable-cache: true
      - run: uv sync --frozen
      - name: Ruff lint
        run: uv run ruff check app eval tests
      - name: Ruff format check
        run: uv run ruff format --check app eval tests
      - name: Mypy (strict)
        run: uv run mypy app eval
      - name: Pytest (100% coverage gate)
        run: uv run pytest
      - name: Eval (12/12 gate)
        run: uv run python -m eval.harness

  frontend:
    name: Frontend (lint · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
